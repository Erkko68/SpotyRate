<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SpotyRate{% endblock %}</title>
    {% load static %}
    <link rel="icon" type="image/svg+xml" href="{% static 'images/svg/Primary_Logo_White_CMYK.svg' %}">
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
</head>
<body>
    <div class="column">
        <!-- Header Section -->
        <div class="section" style="--size: 10; background-color: var(--black)">
            {% block header %}{% endblock %}
        </div>
        <!-- Content -->
        {% block content %}{% endblock %}
        <!-- Footer -->
        {% block footer %}{% endblock %}
    </div>

    {% block scripts %}{% endblock %}
</body>
</html>
